  <line x1="10" y1="68" x2="26" y2="68" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="73" x2="25" y2="73" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="78" x2="25" y2="78" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="83" x2="24" y2="83" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
</svg>