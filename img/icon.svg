  <rect x="28" y="32" width="26" height="10" rx="1.5" fill="#0f172a"/>
  <!-- Barrel extension -->
  <rect x="68" y="32" width="18" height="14" rx="2" fill="#334155"/>
  <!-- Muzzle tip (orange accent) -->
  <rect x="84" y="29" width="7" height="20" rx="3.5" fill="#f97316"/>
  <!-- Hammer at rear -->
  <rect x="5" y="22" width="8" height="9" rx="1.5" fill="#334155"/>
  <!-- Rear sight notch -->
  <rect x="10" y="24" width="5" height="5" rx="0.5" fill="#64748b"/>
  <rect x="11.5" y="25" width="2" height="3" fill="#0f172a"/>
  <!-- Front sight -->
  <rect x="61" y="24" width="3.5" height="5" rx="0.5" fill="#64748b"/>
  <!-- Lower frame / receiver -->
  <rect x="10" y="50" width="50" height="9" rx="2" fill="#334155"/>
  <!-- Trigger guard loop -->
  <path d="M28,59 Q28,79 41,80 Q54,79 55,63 L55,59 Z" fill="#334155"/>
  <path d="M30,60 Q30,76 41,77 Q52,76 53,63 L53,60 Z" fill="#0f172a"/>
